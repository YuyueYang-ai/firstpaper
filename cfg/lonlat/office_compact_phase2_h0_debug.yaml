%YAML:1.0

Model.sh_degree: 3
Model.resolution: -1.0
Model.white_background: 0
Model.eval: 0

Camera.z_near: 0.01
Camera.z_far: 100.0
Monocular.inactive_geo_densify_max_pixel_dist: 0.0
Stereo.min_disparity: 0
Stereo.num_disparity: 0
RGBD.min_depth: 0.0
RGBD.max_depth: 0.0

Mapper.inactive_geo_densify: 0
Mapper.depth_cache: 0
Mapper.min_num_initial_map_kfs: 0
Mapper.new_keyframe_times_of_use: 1
Mapper.local_BA_increased_times_of_use: 0
Mapper.loop_closure_increased_times_of_use_: 0
Mapper.cull_keyframes: 0
Mapper.large_rotation_threshold: 0.0
Mapper.large_translation_threshold: 0.0
Mapper.stable_num_iter_existence: 0

GausPyramid.do: 0
GausPyramid.num_sub_levels: 0
GausPyramid.sub_level_times_of_use: 8

Pipeline.convert_SHs: 0
Pipeline.compute_cov3D: 0

Record.keyframe_record_interval: 0
Record.all_keyframes_record_interval: 8000
Record.record_rendered_image: 0
Record.record_ground_truth_image: 0
Record.record_loss_image: 0
Record.training_report_interval: 1000
Record.record_loop_ply: 0

Optimization.max_num_iterations: 30000
Optimization.position_lr_init: 0.00016
Optimization.position_lr_final: 0.0000016
Optimization.position_lr_delay_mult: 0.01
Optimization.position_lr_max_steps: 30000
Optimization.feature_lr: 0.0025
Optimization.opacity_lr: 0.05
Optimization.scaling_lr: 0.005
Optimization.rotation_lr: 0.001

Optimization.percent_dense: 0.01
Optimization.lambda_dssim: 0.2
Optimization.densification_interval: 100
Optimization.opacity_reset_interval: 3000
Optimization.prune_big_point_after_iter: 0
Optimization.densify_min_opacity: 0.005
Optimization.densify_from_iter: 500
Optimization.densify_until_iter: 15000
Optimization.densify_grad_threshold: 0.0002
Optimization.prune_by_extent: 0

Optimization.skip_bottom_ratio: 0.0

Compression.mode: "compact_phase2"
Compression.save_compact_snapshot: 1
Compression.late_stage_prune_interval: 1000
Compression.late_stage_prune_min_opacity: 0.008
Compression.late_stage_prune_big_point_min_opacity: 0.02
Compression.late_stage_prune_max_scaling_ratio: 0.15
Compression.adaptive_sh_bandwidth_interval: 500
Compression.adaptive_sh_energy_keep_ratio: 0.995
Compression.adaptive_sh_min_opacity: 0.01
Compression.enable_export_prune: 1
Compression.enable_sh_bandwidth: 1
Compression.sort_by_morton: 1
Compression.f_rest_locality_codec: 1
Compression.f_rest_locality_high_sh_block_size: 64
Compression.f_rest_locality_low_sh_block_size: 128
Compression.f_rest_locality_int4_rel_mse_threshold: 0.02
Compression.xyz_quant_bits: 16
Compression.attribute_quant_bits: 8
Compression.rotation_quant_bits: 16

Phase2.enable: 1
Phase2.save_frozen_snapshot: 1
Phase2.freeze_topology_iter: 15000
Phase2.sort_by_morton: 1
Phase2.normalize_xyz: 1
Phase2.mask_features_rest_by_sh_level: 1

Phase2Field.num_fourier_frequencies: 6
Phase2Field.use_hashgrid_encoder: 1
Phase2Field.hashgrid_num_levels: 8
Phase2Field.hashgrid_features_per_level: 2
Phase2Field.hashgrid_log2_hashmap_size: 18
Phase2Field.hashgrid_base_resolution: 16
Phase2Field.hashgrid_per_level_scale: 1.5
Phase2Field.hidden_dim: 128
Phase2Field.num_hidden_layers: 3
Phase2Field.batch_size: 8192
Phase2Field.max_steps: 4000
Phase2Field.log_interval: 200
Phase2Field.eval_interval: 500
Phase2Field.learning_rate: 1e-3
Phase2Field.weight_decay: 1e-6
Phase2Field.include_features_dc: 1
Phase2Field.include_opacity: 1
Phase2Field.include_scaling: 1
Phase2Field.include_rotation: 1
Phase2Field.predict_opacity: 1
Phase2Field.predict_scaling: 1
Phase2Field.predict_rotation: 1
Phase2Field.block_embedding_dim: 16
Phase2Field.save_decoded_compact: 1
Phase2Field.save_phase2_compact: 1
Phase2Field.decoded_xyz_quant_bits: 16
Phase2Field.decoded_attribute_quant_bits: 16
Phase2Field.decoded_rotation_quant_bits: 16
Phase2Field.phase2_compact_pack_sh_levels: 1
Phase2Field.phase2_compact_fdc_quant_bits: 8
Phase2Field.phase2_compact_use_geometry_codec: 1
Phase2Field.phase2_compact_geometry_quant_bits: 16

GaussianViewer.glfw_window_width: 1400
GaussianViewer.glfw_window_height: 1050
GaussianViewer.image_scale: 0.5
GaussianViewer.image_scale_main: 1.0
GaussianViewer.camera_watch_dist: 0.000001


Phase2HybridSelector.enable: 1
Phase2HybridSelector.hard_point_ratio: 0.15
Phase2HybridSelector.alpha: 0.45
Phase2HybridSelector.beta: 0.10
Phase2HybridSelector.gamma: 0.35
Phase2HybridSelector.delta: 0.10
Phase2HybridSelector.explicit_cost_int4_rel_mse_threshold: 0.02
Phase2HybridSelector.min_hard_blocks: 1
Phase2HybridSelector.max_hard_blocks: -1
Phase2HybridSelector.save_debug_tensors: 1
